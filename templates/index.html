<!DOCTYPE html>
<html>

<head>

    <title>FinIntel Analytics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
                135deg,
                #05101f,
                #0A192F,
                #112240
            );

            font-family:"Times New Roman",serif;
        }

        .main-card{

            width:1100px;

            max-width:95%;

            padding:60px;

            border-radius:30px;

            background:
            rgba(255,255,255,0.06);

            backdrop-filter:blur(15px);

            box-shadow:
            0px 20px 50px rgba(0,0,0,0.5);

            text-align:center;
        }

        .logo{

            font-size:90px;

            margin-bottom:10px;
        }

        .title{

            color:white;

            font-size:62px;

            font-weight:bold;

            letter-spacing:1px;
        }

        .subtitle{

            color:#B8C1EC;

            font-size:24px;

            margin-top:10px;
        }

        .tagline{

            color:#64FFDA;

            font-size:18px;

            margin-top:15px;

            margin-bottom:40px;

            letter-spacing:1px;
        }

        .form-control{

            height:75px;

            font-size:24px;

            border-radius:18px;

            padding-left:25px;

            border:none;
        }

        .btn-predict{

            margin-top:30px;

            width:320px;

            height:70px;

            border:none;

            border-radius:18px;

            background:
            linear-gradient(
                90deg,
                #00C896,
                #00E6B0
            );

            color:white;

            font-size:26px;

            font-weight:bold;

            transition:0.3s;

            box-shadow:
            0px 8px 20px rgba(0,200,150,0.35);
        }

        .btn-predict:hover{

            transform:translateY(-4px);

            box-shadow:
            0px 12px 25px rgba(0,200,150,0.55);
        }

        .market-info{

            margin-top:50px;

            display:flex;

            justify-content:center;

            gap:40px;

            flex-wrap:wrap;
        }

        .info-card{

            width:250px;

            background:#112240;

            border-radius:18px;

            padding:20px;

            box-shadow:
            0px 6px 15px rgba(0,0,0,0.3);
        }

        .info-card h3{

            color:#64FFDA;

            font-size:28px;
        }

        .info-card p{

            color:#D8E1F2;

            margin-top:8px;
        }

        .stocks{

            margin-top:40px;

            color:#A8B2D1;

            font-size:18px;
        }

        .stocks span{

            color:#64FFDA;

            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="main-card">

    <div class="logo">
        📈
    </div>

    <h1 class="title">
        FinIntel Analytics
    </h1>

    <p class="subtitle">
        AI-Powered Financial Market Intelligence Platform
    </p>

    <div class="tagline">
        Real-Time Market Analytics • AI Forecasting • Investment Insights
    </div>

    <form action="/predict" method="POST">

        <input
            type="text"
            name="ticker"
            class="form-control"
            placeholder="Enter Stock Symbol (RELIANCE.NS, TCS.NS, INFY.NS, AAPL, TSLA)"
            required>

        <button
            type="submit"
            class="btn-predict">

            Analyze Stock

        </button>

    </form>

    <div class="stocks">

        Popular Symbols:
        <span>RELIANCE.NS</span> |
        <span>TCS.NS</span> |
        <span>INFY.NS</span> |
        <span>AAPL</span> |
        <span>TSLA</span>

    </div>

    <div class="market-info">

        <div class="info-card">

            <h3>500+</h3>

            <p>
                Stocks Supported
            </p>

        </div>

        <div class="info-card">

            <h3>AI</h3>

            <p>
                Machine Learning Prediction
            </p>

        </div>

        <div class="info-card">

            <h3>Live</h3>

            <p>
                Real-Time Market Data
            </p>

        </div>

    </div>

</div>

</body>

</html>
